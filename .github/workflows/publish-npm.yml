name: Publish to npm

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm npm release'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'publish') ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[npm]'))
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
